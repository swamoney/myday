<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Why</title>
<!-- Favicon: embedded inline (SVG) — no file upload needed, works in browser tabs -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20x='0'%20y='0'%20width='512'%20height='512'%20rx='115'%20fill='%23f2ecdf'/%3E%3Cpath%20d='M%20262.1%2080.1%20A%20176%20176%200%200%201%20389.7%20141.5'%20fill='none'%20stroke='%23d0453a'%20stroke-width='40'/%3E%3Cpath%20d='M%20397.3%20151.1%20A%20176%20176%200%200%201%20428.8%20289.2'%20fill='none'%20stroke='%23e8853a'%20stroke-width='40'/%3E%3Cpath%20d='M%20426.1%20301.1%20A%20176%20176%200%200%201%20337.9%20411.8'%20fill='none'%20stroke='%23f4c430'%20stroke-width='40'/%3E%3Cpath%20d='M%20326.8%20417.1%20A%20176%20176%200%200%201%20185.2%20417.1'%20fill='none'%20stroke='%236ba368'%20stroke-width='40'/%3E%3Cpath%20d='M%20174.1%20411.8%20A%20176%20176%200%200%201%2085.9%20301.1'%20fill='none'%20stroke='%233a9bc0'%20stroke-width='40'/%3E%3Cpath%20d='M%2083.2%20289.2%20A%20176%20176%200%200%201%20114.7%20151.1'%20fill='none'%20stroke='%233a6ea5'%20stroke-width='40'/%3E%3Cpath%20d='M%20122.3%20141.5%20A%20176%20176%200%200%201%20249.9%2080.1'%20fill='none'%20stroke='%235f4b8b'%20stroke-width='40'/%3E%3Cg%20transform='translate(184,184)%20scale(6.0)'%3E%3Ccircle%20cx='12'%20cy='12'%20r='8.6'%20fill='none'%20stroke='%2316264d'%20stroke-width='2.2'/%3E%3Cpath%20d='M15.6%208.4l-2.1%205.1l-5.1%202.1l2.1-5.1z'%20fill='%2316264d'/%3E%3C/g%3E%3C/svg%3E">
<meta name="theme-color" content="#203a72">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root { --serif:'Fraunces',Georgia,serif; --sans:'IBM Plex Sans',-apple-system,system-ui,sans-serif; --mono:'IBM Plex Mono','SF Mono',monospace; --hand:'Caveat',cursive; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { font-family:var(--sans); line-height:1.5; min-height:100vh; color:#0A1325; }
  body { padding:26px 18px 70px; background:#eef2f8; background-image:linear-gradient(165deg,#fbfcfe 0%,#e9eef6 100%); background-attachment:fixed; }
  a { text-decoration:none; color:inherit; }
  .hidden { display:none !important; }
  main { max-width:920px; margin:0 auto; }
  input, button, textarea { font-family:inherit; font-size:inherit; color:inherit; }

  /* ===== AUTH ===== */
  .auth-overlay { position:fixed; inset:0; z-index:250; display:flex; align-items:center; justify-content:center; padding:20px; background:#eef2f8; background-image:linear-gradient(165deg,#fbfcfe 0%,#e9eef6 100%); }
  .auth-box { width:100%; max-width:380px; background:rgba(255,255,255,0.72); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.95); border-radius:18px; padding:30px 24px; box-shadow:0 20px 50px rgba(30,50,90,0.12); text-align:center; }
  .auth-icon { font-size:26px; margin-bottom:8px; opacity:0.8; }
  .auth-title { font-family:var(--serif); font-style:italic; font-weight:400; font-size:27px; color:#182233; margin-bottom:4px; }
  .auth-subtitle { font-family:var(--mono); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#7a8296; margin-bottom:22px; }
  .auth-form { display:flex; flex-direction:column; gap:10px; }
  .auth-input { width:100%; background:#f4f7fb; border:1px solid #dce3ee; border-radius:10px; padding:13px 14px; font-size:15px; color:#182233; font-family:var(--mono); letter-spacing:0.05em; }
  .auth-input::placeholder { color:#9aa4ba; }
  .auth-input:focus { outline:none; border-color:#8fa2c4; background:#fff; }
  .auth-error { font-family:var(--mono); font-size:11px; color:#8A1F1A; padding:6px 10px; background:#FCE9E2; border-radius:6px; }
  .auth-submit { background:#1e2740; color:#fff; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; cursor:pointer; transition:all 0.15s; margin-top:4px; }
  .auth-submit:active { transform:scale(0.98); opacity:0.92; }
  .auth-submit:disabled { opacity:0.5; cursor:not-allowed; }

  /* ===== ROOM ===== */
  .room { border-radius:22px; overflow:hidden; box-shadow:0 20px 50px rgba(20,30,60,0.14); }
  .why-head { background:linear-gradient(155deg,#203a72,#0f1f42); color:#fff; padding:30px 38px 30px; position:relative; }
  .head-top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:22px; }
  .hub-back { font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); }
  .hub-back:hover { color:#f4c430; }
  /* Edit + Sign out — icon + label pair at the page end (matches the hub). */
  .end-actions { display:flex; justify-content:center; gap:34px; margin-top:30px; }
  .end-actions .cell { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .ib { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.72); border:1px solid #dce3ee; color:#7a8498; cursor:pointer; transition:all .15s; }
  .ib svg { width:19px; height:19px; }
  .ib.edit:hover { border-color:#a5702f; color:#a5702f; background:#fff; }
  .ib.edit.active { border-color:#a5702f; color:#a5702f; background:#fbf6ec; }
  .ib.out:hover { border-color:#a8443e; color:#a8443e; background:#fff; }
  .cap { font-family:var(--mono); font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:#9aa4ba; }
  .why-eyebrow { font-family:'Caveat',cursive; font-weight:500; font-size:23px; letter-spacing:0.01em; color:#f3d585; margin-bottom:12px; }
  .why-title { font-family:var(--serif); font-size:50px; font-weight:600; letter-spacing:-0.02em; line-height:1; }
  .why-line { font-family:var(--serif); font-style:italic; font-size:16px; margin-top:13px; color:rgba(255,255,255,0.7); max-width:520px; }

  .spine-body { background:#fbfcfe; padding:22px 38px 30px; position:relative; }
  .spine-line { position:absolute; left:69px; top:30px; bottom:30px; width:2px; background:linear-gradient(#f4c430, #e0c98a 55%, rgba(224,201,138,0.18)); }
  .snode { display:grid; grid-template-columns:64px 1fr; align-items:start; gap:24px; padding:22px 0; position:relative; border-bottom:1px solid #eef1f6; transition:padding .15s; }
  .snode:last-child { border-bottom:none; }
  .smark { width:64px; height:64px; border-radius:50%; background:radial-gradient(circle at 38% 34%, #ffdd6e, #f4c430 62%, #d9a922); display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:21px; font-weight:600; color:#4a3410; z-index:1; box-shadow:0 6px 16px rgba(180,140,40,0.35), inset 0 -3px 6px rgba(120,90,10,0.25); margin-top:2px; }
  .snum { font-family:var(--serif); font-size:46px; font-weight:600; color:#182233; line-height:1; }
  .snum .brk { font-family:var(--mono); font-size:12px; font-weight:600; color:#a5702f; margin-left:10px; }
  .scontent { min-width:0; }
  .s-rule { height:3px; width:52px; background:#f4c430; border-radius:2px; margin:9px 0 13px; }
  .s-field { margin-bottom:11px; }
  .s-field:last-child { margin-bottom:0; }
  .s-k { display:block; font-family:var(--mono); font-size:8.5px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:#aab4c8; margin-bottom:3px; }
  .s-stands { font-family:'Cormorant Garamond',Georgia,serif; font-size:22px; font-weight:600; color:#182233; line-height:1.2; }
  .s-stands.empty { color:#c3ccdb; font-style:italic; font-weight:500; }
  .s-pill { display:inline-flex; align-items:center; gap:7px; padding:6px 14px; border-radius:20px; color:#fff; font-size:12.5px; font-weight:600; }
  .s-pill .pdot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.6); }

  /* edit affordances */
  .node-tools { position:absolute; right:0; top:50%; transform:translateY(-50%); display:none; gap:6px; z-index:2; }
  body.editing .node-tools { display:flex; }
  body.editing .snode { padding-right:96px; }
  .nt { width:28px; height:28px; border-radius:7px; border:1px solid #dce3ee; background:#fff; color:#6a7690; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .nt:hover { border-color:#a5702f; color:#a5702f; }
  .add-row { display:none; margin-top:4px; padding-top:16px; }
  body.editing .add-row { display:block; }
  .add-why { width:100%; border:1.5px dashed #cdd6e3; background:transparent; border-radius:12px; padding:14px; font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#8189a0; cursor:pointer; transition:all .15s; }
  .add-why:hover { border-color:#a5702f; color:#a5702f; background:#fbf6ec; }

  @media (max-width:640px) {
    .why-head { padding:26px 22px; }
    .why-title { font-size:40px; }
    .spine-body { padding:18px 20px 26px; }
    .spine-line { left:46px; }
    .snode { grid-template-columns:52px 1fr; gap:16px; align-items:start; }
    .smark { width:52px; height:52px; font-size:18px; }
    body.editing .snode { padding-right:0; }
    .node-tools { position:static; transform:none; grid-column:1 / -1; margin-top:6px; }
  }

  .foot-note { text-align:center; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#a8b2c4; margin-top:20px; }

  /* selectable rows (read mode) */
  .snode { cursor:pointer; border-radius:10px; }
  body:not(.editing) .snode:hover { background:#f6f8fb; }
  .snode.active { background:#fbf6ec; }
  .snode.active .smark { box-shadow:0 0 0 3px rgba(244,196,48,0.55), 0 6px 16px rgba(180,140,40,0.45); }
  .open-cue { position:absolute; right:6px; top:50%; transform:translateY(-50%); font-family:var(--mono); font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:#c39a45; background:linear-gradient(90deg, rgba(251,246,236,0) 0%, #fbf6ec 30%); padding:6px 6px 6px 22px; opacity:0; transition:opacity .15s; pointer-events:none; }
  body:not(.editing) .snode:hover .open-cue, .snode.active .open-cue { opacity:1; }
  body.editing .open-cue { display:none; }

  /* notes — sticky-note pinboard, one coloured sticky per why-with-notes */
  .notes-panel { margin-top:22px; }
  .notes-empty { text-align:center; font-family:var(--serif); font-style:italic; color:#aab4c8; padding:22px; border-top:1px dashed #e0e6ef; }
  .board { border-top:2px solid #eef1f6; padding-top:22px; display:flex; flex-wrap:wrap; gap:20px; }
  .sticky { width:min(330px, 100%); min-height:466px; display:flex; flex-direction:column; align-items:flex-start; padding:20px 22px 26px; border-radius:4px; box-shadow:0 8px 18px rgba(30,40,70,0.14); position:relative; }
  .sticky:nth-child(odd) { transform:rotate(-1.1deg); }
  .sticky:nth-child(even) { transform:rotate(1.3deg); }
  .sticky::before { content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:9px; height:9px; border-radius:50%; background:rgba(0,0,0,0.16); box-shadow:inset 0 -1px 2px rgba(0,0,0,0.3); }
  .sticky-h { display:inline-block; font-family:var(--hand); font-size:27px; font-weight:700; line-height:1; padding-bottom:3px; margin:10px 0 10px; border-bottom:3px solid; }
  .sticky-st { position:absolute; top:12px; right:14px; font-family:var(--mono); font-size:8px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; opacity:0.45; min-height:10px; }
  .sticky-txt { width:100%; flex:1 1 auto; min-height:160px; resize:vertical; border:none; background:transparent; font-family:'Caveat',cursive; font-size:21px; line-height:1.45; color:rgba(28,26,18,0.9); }
  .sticky-txt:focus { outline:none; }
  .sticky-txt::placeholder { color:rgba(30,28,20,0.32); font-style:italic; }
  @media (max-width:560px) { .sticky { width:100%; transform:none !important; } }
  .loading { text-align:center; padding:60px 20px; color:#8189a0; font-family:var(--mono); font-size:12px; letter-spacing:0.1em; text-transform:uppercase; }

  /* ===== MODAL ===== */
  .modal-overlay { position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(18,26,44,0.55); backdrop-filter:blur(4px); }
  .modal { width:100%; max-width:440px; background:#fff; border-radius:18px; padding:26px 24px; box-shadow:0 30px 70px rgba(10,20,40,0.35); max-height:90vh; overflow-y:auto; }
  .modal-title { font-family:var(--serif); font-size:22px; font-weight:600; color:#182233; margin-bottom:4px; }
  .modal-sub { font-family:var(--mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#8189a0; margin-bottom:18px; }
  .fld { margin-bottom:14px; }
  .fld label { display:block; font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#8189a0; margin-bottom:5px; }
  .fld input, .fld textarea, .fld select { width:100%; background:#f4f7fb; border:1px solid #dce3ee; border-radius:9px; padding:11px 12px; font-size:14px; color:#182233; }
  .fld input:focus, .fld textarea:focus, .fld select:focus { outline:none; border-color:#c9a94a; background:#fff; }
  .fld textarea { min-height:72px; resize:vertical; font-family:var(--sans); line-height:1.5; }
  .fld .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-actions { display:flex; align-items:center; gap:8px; margin-top:20px; }
  .btn-primary { background:#1e2740; color:#fff; border:none; border-radius:9px; padding:11px 18px; font-weight:600; font-size:13px; cursor:pointer; }
  .btn-primary:hover { background:#28324b; }
  .btn-ghost { background:transparent; border:1px solid #dce3ee; border-radius:9px; padding:11px 16px; font-size:13px; color:#6a7690; cursor:pointer; }
  .btn-ghost:hover { border-color:#8fa2c4; }
  .btn-danger { background:transparent; border:1px solid #e6c4c0; border-radius:9px; padding:11px 14px; font-size:13px; color:#a8443e; cursor:pointer; }
  .btn-danger:hover { background:#fbf1f0; border-color:#a8443e; }
  .modal-err { font-family:var(--mono); font-size:11px; color:#8A1F1A; padding:6px 10px; background:#FCE9E2; border-radius:6px; margin-bottom:12px; }

  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:#1e2740; color:#fff; padding:11px 20px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s; z-index:400; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<script src="config.js"></script>

<div class="auth-overlay hidden" id="authOverlay">
  <div class="auth-box">
    <div class="auth-icon">&#10039;</div>
    <div class="auth-title">My Why</div>
    <div class="auth-subtitle">Sign in</div>
    <div class="auth-form">
      <input type="email" class="auth-input" id="authEmail" placeholder="Email" autocomplete="email">
      <input type="password" class="auth-input" id="authPw" placeholder="Password" autocomplete="current-password">
      <div class="auth-error hidden" id="authError"></div>
      <button class="auth-submit" id="authSubmit">Sign in</button>
    </div>
  </div>
</div>

<div class="loading" id="bootLoading">Loading&hellip;</div>

<main id="app" class="hidden">
  <div class="room">
    <div class="why-head">
      <div class="head-top">
        <a class="hub-back" href="/">&larr; Hub</a>
      </div>
      <div class="why-eyebrow">The long road, marked</div>
      <div class="why-title">My Why</div>
      <div class="why-line">The few things worth every early morning &mdash; kept on one line, so the daily choices stay pointed at them.</div>
    </div>
    <div class="spine-body">
      <div class="spine-line"></div>
      <div id="spine"></div>
      <div class="add-row"><button class="add-why" id="addBtn">&#43; Add a why</button></div>
      <div id="notesPanel" class="notes-panel"></div>
    </div>
  </div>
  <div class="foot-note">one life, live it well</div>

  <div class="end-actions">
    <div class="cell">
      <button class="ib edit" id="editToggle" title="Edit" aria-label="Edit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </button>
      <span class="cap" id="editCap">Edit</span>
    </div>
    <div class="cell">
      <button class="ib out" id="signOutBtn" title="Sign out" aria-label="Sign out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
      </button>
      <span class="cap">Sign out</span>
    </div>
  </div>
</main>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Edit why</div>
    <div class="modal-sub">a reason worth building for</div>
    <div class="modal-err hidden" id="modalErr"></div>
    <div class="fld"><div class="row2">
      <div><label>Code</label><input id="mCode" placeholder="e.g. F" maxlength="6"></div>
      <div><label>Number</label><input id="mNum" placeholder="e.g. 150"></div>
    </div></div>
    <div class="fld"><label>Breakdown (optional)</label><input id="mBrk" placeholder="e.g. 1 &times; 1 &times; 1"></div>
    <div class="fld"><label>Stands for</label><input id="mLabel" placeholder="what this code means"></div>
    <div class="fld"><label>Current status</label><textarea id="mWhy" placeholder="where this stands right now"></textarea></div>
    <div class="fld"><label>Status state</label><select id="mState"><option value="">Not set</option><option value="good">On track</option><option value="watch">Watch</option><option value="off">Slipping</option></select></div>
    <div class="modal-actions">
      <button class="btn-danger hidden" id="mDelete">Delete</button>
      <span style="flex:1"></span>
      <button class="btn-ghost" id="mCancel">Cancel</button>
      <button class="btn-primary" id="mSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
// ===== CONFIG GUARD =====
if (typeof window.MYDAY_CONFIG === 'undefined') {
  document.body.innerHTML = '<div style="padding:30px;font-family:system-ui;color:#8A1F1A;text-align:center;"><h2>Configuration error</h2><p>config.js is missing or didn\'t load.</p><p style="font-size:13px;color:#666;">Upload <code>why.html</code> and <code>config.js</code> to the same repo.</p></div>';
  throw new Error('config.js missing');
}

// ===== SUPABASE (same project + session as the rest of the hub) =====
const supa = window.supabase.createClient(
  window.MYDAY_CONFIG.SUPABASE_URL,
  window.MYDAY_CONFIG.SUPABASE_ANON_KEY,
  { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
);

let userId = null;
let pillars = [];
let editingId = null;
let selectedId = null;
let notesTimer = null;

function el(id) { return document.getElementById(id); }
function escHtml(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg) { const t = el('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000); }

// Starter set — seeded once on first load, then fully editable in-app.
const DEFAULTS = [
  { code:'IN', num:'125', brk:'',          label:'', current_status:'', notes:'' },
  { code:'H',  num:'77',  brk:'',          label:'', current_status:'', notes:'' },
  { code:'F',  num:'150', brk:'1 \u00d7 1 \u00d7 1', label:'', current_status:'', notes:'' },
  { code:'T',  num:'75',  brk:'',          label:'', current_status:'', notes:'' },
  { code:'S',  num:'25+', brk:'',          label:'', current_status:'', notes:'' },
];

// ===== DATA =====
async function loadPillars() {
  const { data, error } = await supa.from('why_pillars').select('*').eq('user_id', userId).order('sort_order', { ascending: true });
  if (error) throw error;
  if (!data || data.length === 0) {
    const seed = DEFAULTS.map((d, i) => Object.assign({}, d, { user_id: userId, sort_order: i }));
    const { data: ins, error: e2 } = await supa.from('why_pillars').insert(seed).select();
    if (e2) throw e2;
    pillars = (ins || []).slice().sort((a, b) => a.sort_order - b.sort_order);
  } else {
    pillars = data;
  }
  if (selectedId && !pillars.some(p => String(p.id) === String(selectedId))) selectedId = null;
  renderSpine();
  renderNotes();
}

function renderSpine() {
  const STATE = { good:'#3d7a5c', watch:'#c08a1f', off:'#a8443e', '':'#95a4bb' };
  el('spine').innerHTML = pillars.map(p => {
    const brk = p.brk ? '<span class="brk">' + escHtml(p.brk) + '</span>' : '';
    const label = p.label ? escHtml(p.label) : '&mdash;';
    const standsCls = p.label ? 's-stands' : 's-stands empty';
    const stColor = STATE[p.state || ''] || STATE[''];
    const stTxt = p.current_status ? escHtml(p.current_status) : '&mdash;';
    const activeCls = (selectedId && String(p.id) === String(selectedId)) ? ' active' : '';
    return '<div class="snode' + activeCls + '" data-id="' + p.id + '">' +
      '<div class="node-tools">' +
        '<button class="nt" data-edit="' + p.id + '" title="Edit">&#9998;</button>' +
        '<button class="nt" data-up="' + p.id + '" title="Move up">&#9650;</button>' +
        '<button class="nt" data-down="' + p.id + '" title="Move down">&#9660;</button>' +
      '</div>' +
      '<div class="smark">' + escHtml(p.code) + '</div>' +
      '<div class="scontent">' +
        '<div class="snum">' + escHtml(p.num) + brk + '</div>' +
        '<div class="s-rule"></div>' +
        '<div class="s-field"><span class="s-k">Stands for</span><div class="' + standsCls + '">' + label + '</div></div>' +
        '<div class="s-field"><span class="s-k">Current status</span>' +
          '<span class="s-pill" style="background:' + stColor + ';"><span class="pdot"></span>' + stTxt + '</span>' +
        '</div>' +
      '</div>' +
      '<span class="open-cue">Note &rsaquo;</span>' +
    '</div>';
  }).join('');
}

// ===== NOTES WHITEBOARD (one free space per why) =====
// Distinct sticky palette, assigned by pillar position (1st blue, 2nd green, …).
const STICKY = [
  { bg:'#cfe0f7', head:'#2c477e' },  // blue
  { bg:'#cfe9d8', head:'#2f6146' },  // green
  { bg:'#f7e6c2', head:'#8a5e22' },  // amber
  { bg:'#e6d3ee', head:'#6b4a7a' },  // plum
  { bg:'#f7d6d2', head:'#8f3a34' },  // rose
];
function stickyColor(i) { return STICKY[i % STICKY.length]; }

function openNotes(id) {
  // Notes stay hidden until you tap a why; tapping the open one again closes it.
  selectedId = (String(selectedId) === String(id)) ? null : id;
  document.querySelectorAll('#spine .snode').forEach(n => n.classList.toggle('active', selectedId !== null && n.dataset.id === String(selectedId)));
  renderNotes();
  if (selectedId !== null) {
    const ta = document.querySelector('#notesPanel textarea[data-id="' + id + '"]');
    if (ta) { ta.scrollIntoView({ behavior: 'smooth', block: 'center' }); ta.focus(); }
  }
}

function renderNotes() {
  const panel = el('notesPanel');
  if (!panel) return;
  // Show a sticky for every why that has notes, plus the one currently focused
  // (so an empty why you just tapped gives you a fresh sticky to write in).
  const shown = selectedId ? pillars.filter(p => String(p.id) === String(selectedId)) : [];
  if (!shown.length) {
    panel.innerHTML = '<div class="notes-empty">Tap a why above to open its note.</div>';
    return;
  }
  panel.innerHTML = '<div class="board">' + shown.map(p => {
    const i = pillars.findIndex(x => String(x.id) === String(p.id));
    const c = stickyColor(i < 0 ? 0 : i);
    const numLine = escHtml(p.num) + (p.brk ? ' &middot; ' + escHtml(p.brk) : '');
    return '<div class="sticky" style="background:' + c.bg + ';">' +
      '<span class="sticky-st" id="st_' + p.id + '"></span>' +
      '<div class="sticky-h" style="color:' + c.head + ';">' + escHtml(p.code) + ' &middot; ' + numLine + '</div>' +
      '<textarea class="sticky-txt" data-id="' + p.id + '" placeholder="Jot anything for this why…">' + escHtml(p.notes || '') + '</textarea>' +
    '</div>';
  }).join('') + '</div>';
}

function setStatus(id, msg) { const s = el('st_' + id); if (s) s.textContent = msg; }

function scheduleNotesSave(id, text) {
  setStatus(id, 'Saving…');
  clearTimeout(notesTimer);
  notesTimer = setTimeout(() => saveNotes(id, text), 700);
}
async function saveNotes(id, text) {
  clearTimeout(notesTimer);
  const local = pillars.find(x => String(x.id) === String(id));
  if (local && local.notes === text) { setStatus(id, 'Saved'); return; }
  try {
    const { error } = await supa.from('why_pillars').update({ notes: text }).eq('id', id).eq('user_id', userId);
    if (error) throw error;
    if (local) local.notes = text;
    setStatus(id, 'Saved');
  } catch (e) { setStatus(id, 'Save failed'); }
}

// ===== EDIT MODE =====
function toggleEdit() {
  const on = document.body.classList.toggle('editing');
  const btn = el('editToggle');
  btn.classList.toggle('active', on);
  el('editCap').textContent = on ? 'Done' : 'Edit';
  btn.setAttribute('title', on ? 'Done' : 'Edit');
  btn.innerHTML = on
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
}

// ===== MODAL =====
function openModal(id) {
  editingId = id || null;
  const p = id ? pillars.find(x => String(x.id) === String(id)) : null;
  el('modalTitle').textContent = p ? 'Edit why' : 'New why';
  el('mCode').value = p ? (p.code || '') : '';
  el('mNum').value = p ? (p.num || '') : '';
  el('mBrk').value = p ? (p.brk || '') : '';
  el('mLabel').value = p ? (p.label || '') : '';
  el('mWhy').value = p ? (p.current_status || '') : '';
  el('mState').value = p ? (p.state || '') : '';
  el('mDelete').classList.toggle('hidden', !p);
  el('modalErr').classList.add('hidden');
  el('modalOverlay').classList.remove('hidden');
  setTimeout(() => el('mCode').focus(), 30);
}
function closeModal() { el('modalOverlay').classList.add('hidden'); editingId = null; }

async function savePillar() {
  const rec = {
    code: el('mCode').value.trim(),
    num: el('mNum').value.trim(),
    brk: el('mBrk').value.trim(),
    label: el('mLabel').value.trim(),
    current_status: el('mWhy').value.trim(),
    state: el('mState').value,
  };
  if (!rec.code && !rec.num) {
    const er = el('modalErr'); er.textContent = 'Add at least a code or a number.'; er.classList.remove('hidden'); return;
  }
  const btn = el('mSave'); btn.disabled = true; btn.textContent = 'Saving…';
  try {
    if (editingId) {
      const { error } = await supa.from('why_pillars').update(rec).eq('id', editingId).eq('user_id', userId);
      if (error) throw error;
    } else {
      const maxOrder = pillars.reduce((m, p) => Math.max(m, p.sort_order || 0), -1);
      rec.user_id = userId; rec.sort_order = maxOrder + 1;
      const { error } = await supa.from('why_pillars').insert(rec);
      if (error) throw error;
    }
    closeModal(); await loadPillars(); toast('Saved');
  } catch (e) {
    const er = el('modalErr'); er.textContent = (e && e.message) ? e.message : 'Save failed'; er.classList.remove('hidden');
  } finally { btn.disabled = false; btn.textContent = 'Save'; }
}

async function deletePillar() {
  if (!editingId) return;
  if (!confirm('Delete this why?')) return;
  try {
    const { error } = await supa.from('why_pillars').delete().eq('id', editingId).eq('user_id', userId);
    if (error) throw error;
    closeModal(); await loadPillars(); toast('Deleted');
  } catch (e) { toast('Delete failed'); }
}

async function movePillar(id, dir) {
  const idx = pillars.findIndex(p => String(p.id) === String(id));
  const swap = idx + dir;
  if (idx < 0 || swap < 0 || swap >= pillars.length) return;
  const a = pillars[idx], b = pillars[swap];
  const ao = a.sort_order, bo = b.sort_order;
  try {
    await supa.from('why_pillars').update({ sort_order: bo }).eq('id', a.id).eq('user_id', userId);
    await supa.from('why_pillars').update({ sort_order: ao }).eq('id', b.id).eq('user_id', userId);
    await loadPillars();
  } catch (e) { toast('Reorder failed'); }
}

// ===== AUTH =====
async function boot() {
  const { data: { session } } = await supa.auth.getSession();
  el('bootLoading').classList.add('hidden');
  if (session && session.user) {
    userId = session.user.id; showApp(); await loadPillars();
  } else {
    el('authOverlay').classList.remove('hidden');
  }
}
function showApp() { el('authOverlay').classList.add('hidden'); el('app').classList.remove('hidden'); }
async function handleSignIn() {
  const email = el('authEmail').value.trim();
  const pw = el('authPw').value;
  const errorEl = el('authError'); const btn = el('authSubmit');
  errorEl.classList.add('hidden');
  if (!email || !pw) { errorEl.textContent = 'Email and password required'; errorEl.classList.remove('hidden'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const { data, error } = await supa.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    if (!data || !data.user) throw new Error('No user returned');
    userId = data.user.id; el('authPw').value = '';
    showApp(); await loadPillars();
  } catch (e) {
    errorEl.textContent = (e && e.message) ? e.message : 'Sign in failed';
    errorEl.classList.remove('hidden');
  } finally { btn.disabled = false; btn.textContent = 'Sign in'; }
}
window.__supa = supa;
async function handleSignOut() { try { await supa.auth.signOut(); } catch (e) {} location.reload(); }

// ===== WIRING =====
el('authSubmit').addEventListener('click', handleSignIn);
el('authPw').addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
el('signOutBtn').addEventListener('click', handleSignOut);
el('editToggle').addEventListener('click', toggleEdit);
el('addBtn').addEventListener('click', () => openModal(null));
el('mSave').addEventListener('click', savePillar);
el('mCancel').addEventListener('click', closeModal);
el('mDelete').addEventListener('click', deletePillar);
el('modalOverlay').addEventListener('click', e => { if (e.target === el('modalOverlay')) closeModal(); });
el('spine').addEventListener('click', e => {
  const ed = e.target.closest('[data-edit]'); if (ed) { openModal(ed.dataset.edit); return; }
  const up = e.target.closest('[data-up]'); if (up) { movePillar(up.dataset.up, -1); return; }
  const dn = e.target.closest('[data-down]'); if (dn) { movePillar(dn.dataset.down, 1); return; }
  if (document.body.classList.contains('editing')) return;
  const row = e.target.closest('.snode'); if (row && row.dataset.id) openNotes(row.dataset.id);
});

// Sticky notes: autosave on type (debounced) and on blur.
el('notesPanel').addEventListener('input', e => {
  const ta = e.target.closest('textarea[data-id]'); if (ta) scheduleNotesSave(ta.dataset.id, ta.value);
});
el('notesPanel').addEventListener('focusout', e => {
  const ta = e.target.closest('textarea[data-id]'); if (ta) saveNotes(ta.dataset.id, ta.value);
});

boot();
</script>
<!-- App lock (PIN) — unlock once per app session, covers all pages; + sign-out-all -->
<script>
(function(){
  'use strict';
  if (window.__applockLoaded) return; window.__applockLoaded = true;
  var LS_PIN='applock.pin.v1', LS_SALT='applock.salt.v1', LS_IDLE='applock.idlemin.v1';
  var SS_UNLOCKED='applock.unlocked', GRACE_MS=60000;
  function idleMin(){ var v=parseInt(localStorage.getItem(LS_IDLE)||'5',10); return isNaN(v)?5:v; }
  function pinSet(){ return !!localStorage.getItem(LS_PIN); }
  function hasSession(){
    try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(/^sb-.*-auth-token$/.test(k)){ var v=localStorage.getItem(k)||''; if(v.indexOf('access_token')>=0) return true; } } }catch(e){}
    return false;
  }
  function clearSession(){ try{ for(var i=localStorage.length-1;i>=0;i--){ var k=localStorage.key(i); if(/^sb-.*-auth-token$/.test(k)) localStorage.removeItem(k); } }catch(e){} }
  function markUnlocked(){ try{ sessionStorage.setItem(SS_UNLOCKED,'1'); }catch(e){} }
  function markLocked(){ try{ sessionStorage.removeItem(SS_UNLOCKED); }catch(e){} }
  function unlockedThisSession(){ try{ return sessionStorage.getItem(SS_UNLOCKED)==='1'; }catch(e){ return false; } }
  function getSalt(){ var s=localStorage.getItem(LS_SALT); if(!s){ var a=crypto.getRandomValues(new Uint8Array(16)); s=Array.prototype.map.call(a,function(b){return ('0'+b.toString(16)).slice(-2);}).join(''); localStorage.setItem(LS_SALT,s);} return s; }
  async function hashPin(pin){ var enc=new TextEncoder().encode(getSalt()+':'+pin); var buf=await crypto.subtle.digest('SHA-256',enc); return Array.prototype.map.call(new Uint8Array(buf),function(b){return ('0'+b.toString(16)).slice(-2);}).join(''); }

  var css=""
    +".al-fab{position:fixed;left:14px;bottom:14px;z-index:2147483000;width:42px;height:42px;border-radius:50%;background:#1c2f5e;color:#fff;border:none;display:none;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(20,30,60,.3);cursor:pointer;}"
    +".al-fab svg{width:19px;height:19px;}"
    +".al-ov{position:fixed;inset:0;z-index:2147483600;background:linear-gradient(160deg,#f6f0e4,#e8dcc9);display:none;align-items:center;justify-content:center;flex-direction:column;font-family:'IBM Plex Sans',system-ui,sans-serif;padding:20px;}"
    +".al-ov.show{display:flex;}"
    +".al-ring{width:66px;height:66px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#ffdd6e,#f4c430 62%,#d9a922);display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 6px 16px rgba(180,140,40,.35);}"
    +".al-ring svg{width:30px;height:30px;color:#4a3410;}"
    +".al-t{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;color:#182233;margin-bottom:4px;}"
    +".al-s{font-size:12.5px;color:#6a7690;margin-bottom:16px;}"
    +".al-in{font-size:22px;letter-spacing:8px;text-align:center;width:190px;max-width:70vw;padding:12px;border:1px solid #d8c7b0;border-radius:12px;background:#fff;color:#182233;outline:none;}"
    +".al-in:focus{border-color:#c9a94a;}"
    +".al-err{color:#a8443e;font-size:12px;height:16px;margin-top:8px;}"
    +".al-go{margin-top:12px;background:#1c2f5e;color:#fff;border:none;border-radius:10px;padding:11px 26px;font-size:14px;font-weight:600;cursor:pointer;}"
    +".al-forgot{margin-top:16px;background:none;border:none;color:#8a7f6a;font-size:11.5px;text-decoration:underline;cursor:pointer;}"
    +".al-panel{position:fixed;inset:0;z-index:2147483500;background:rgba(15,25,45,.45);display:none;align-items:center;justify-content:center;font-family:'IBM Plex Sans',system-ui,sans-serif;padding:20px;}"
    +".al-panel.show{display:flex;}"
    +".al-box{background:#fff;border-radius:16px;padding:20px;width:300px;max-width:92vw;box-shadow:0 20px 50px rgba(0,0,0,.3);}"
    +".al-box h3{font-family:'Fraunces',Georgia,serif;font-size:17px;margin:0 0 6px;color:#182233;}"
    +".al-box label{display:block;font-size:11px;color:#6a7690;margin:12px 0 4px;font-weight:600;}"
    +".al-box input,.al-box select{width:100%;padding:9px 10px;border:1px solid #dce3ee;border-radius:9px;font-size:14px;box-sizing:border-box;}"
    +".al-row{display:flex;gap:8px;margin-top:16px;}"
    +".al-row button{flex:1;border:none;border-radius:9px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;}"
    +".al-save{background:#1c2f5e;color:#fff;}.al-cancel{background:#eef1f6;color:#3a4560;}"
    +".al-danger{width:100%;margin-top:10px;background:#fff;border:1px solid #e3bfc8;color:#a8443e;border-radius:9px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;}"
    +".al-note{font-size:10.5px;color:#8a94a8;margin-top:10px;line-height:1.45;}";
  var st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);

  var LOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>';

  var fab=document.createElement('button'); fab.className='al-fab'; fab.innerHTML=LOCK; fab.title='App lock'; document.body.appendChild(fab);

  var ov=document.createElement('div'); ov.className='al-ov';
  ov.innerHTML='<div class="al-ring">'+LOCK+'</div><div class="al-t">Locked</div><div class="al-s">Enter your PIN to continue</div>'
    +'<input class="al-in" id="alIn" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="12" autocomplete="off">'
    +'<div class="al-err" id="alErr"></div>'
    +'<button class="al-go" id="alGo">Unlock</button>'
    +'<button class="al-forgot" id="alForgot">Forgot PIN? Sign out</button>';
  document.body.appendChild(ov);
  var input=ov.querySelector('#alIn'), errEl=ov.querySelector('#alErr');

  var panel=document.createElement('div'); panel.className='al-panel'; document.body.appendChild(panel);

  function showErr(m){ errEl.textContent=m||''; }
  function lock(){ if(!pinSet())return; markLocked(); ov.classList.add('show'); document.body.style.overflow='hidden'; input.value=''; showErr(''); setTimeout(function(){try{input.focus();}catch(e){}},60); }
  function unlock(){ markUnlocked(); ov.classList.remove('show'); document.body.style.overflow=''; }
  async function tryUnlock(){ if(!input.value)return; var h=await hashPin(input.value); if(h===localStorage.getItem(LS_PIN)){ unlock(); resetIdle(); } else { showErr('Wrong PIN'); input.value=''; try{input.focus();}catch(e){} } }
  ov.querySelector('#alGo').addEventListener('click', tryUnlock);
  input.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); tryUnlock(); } });
  input.addEventListener('input',function(){ showErr(''); });
  ov.querySelector('#alForgot').addEventListener('click', async function(){
    if(!confirm('This signs you out on this device so you can log back in with your account password. Continue?'))return;
    localStorage.removeItem(LS_PIN); markLocked();
    try{ if(window.__supa) await window.__supa.auth.signOut({scope:'local'}); }catch(e){}
    clearSession(); location.reload();
  });

  var idleT;
  function resetIdle(){ clearTimeout(idleT); var m=idleMin(); if(m>0 && pinSet() && hasSession()){ idleT=setTimeout(function(){ if(!ov.classList.contains('show')) lock(); }, m*60000); } }
  ['mousemove','keydown','touchstart','click','scroll'].forEach(function(ev){ document.addEventListener(ev,function(){ if(!ov.classList.contains('show')) resetIdle(); },{passive:true}); });
  var hiddenAt=0;
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='hidden'){ hiddenAt=Date.now(); }
    else if(document.visibilityState==='visible'){ if(pinSet() && hasSession() && (Date.now()-hiddenAt)>GRACE_MS && !ov.classList.contains('show')) lock(); }
  });

  function openPanel(){
    var set=pinSet();
    panel.innerHTML='<div class="al-box"><h3>App lock</h3>'
      +'<div class="al-note" style="margin-top:0">A PIN keeps casual snoopers out. You unlock once per app open; moving between sections won&rsquo;t re-prompt. Use &ldquo;Sign out all devices&rdquo; if a device is lost.</div>'
      +'<label>'+(set?'Change PIN (blank = keep current)':'Set a PIN (4+ digits)')+'</label>'
      +'<input id="alNew" type="password" inputmode="numeric" maxlength="12" placeholder="New PIN">'
      +'<input id="alNew2" type="password" inputmode="numeric" maxlength="12" placeholder="Confirm PIN" style="margin-top:8px;">'
      +'<label>Auto-lock after</label><select id="alIdle"><option value="0">Off</option><option value="1">1 min</option><option value="3">3 min</option><option value="5">5 min</option><option value="15">15 min</option></select>'
      +'<div class="al-err" id="alPErr" style="height:auto;margin-top:6px;"></div>'
      +'<div class="al-row"><button class="al-cancel" id="alCancel">Close</button><button class="al-save" id="alSave">Save</button></div>'
      +(set?'<button class="al-danger" id="alRemove">Remove PIN</button>':'')
      +'<button class="al-danger" id="alSignoutAll">Sign out all devices</button>'
      +'</div>';
    panel.classList.add('show');
    panel.querySelector('#alIdle').value=String(idleMin());
    panel.querySelector('#alCancel').onclick=function(){ panel.classList.remove('show'); };
    panel.querySelector('#alSave').onclick=async function(){
      var n=panel.querySelector('#alNew').value, n2=panel.querySelector('#alNew2').value, pe=panel.querySelector('#alPErr');
      localStorage.setItem(LS_IDLE, panel.querySelector('#alIdle').value);
      if(!n && set){ panel.classList.remove('show'); resetIdle(); return; }
      if(!/^[0-9]{4,}$/.test(n)){ pe.textContent='PIN must be at least 4 digits.'; return; }
      if(n!==n2){ pe.textContent='PINs do not match.'; return; }
      localStorage.setItem(LS_PIN, await hashPin(n)); markUnlocked();
      panel.classList.remove('show'); resetIdle(); fab.style.display='flex';
    };
    var rm=panel.querySelector('#alRemove'); if(rm) rm.onclick=function(){ if(confirm('Remove the PIN lock?')){ localStorage.removeItem(LS_PIN); markLocked(); panel.classList.remove('show'); } };
    panel.querySelector('#alSignoutAll').onclick=async function(){
      if(!confirm('Sign out MyDay on ALL your devices? Other devices will need to log in again.'))return;
      try{ if(window.__supa) await window.__supa.auth.signOut({scope:'global'}); }catch(e){}
      clearSession(); location.reload();
    };
  }
  fab.addEventListener('click', openPanel);

  if(hasSession()) fab.style.display='flex';
  if(pinSet() && hasSession() && !unlockedThisSession()) lock();
  resetIdle();
})();
</script>
